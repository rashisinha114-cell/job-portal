<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/post-job-page">Post Job</a>
    <a href="/logout">Logout</a>
</div>

<h2>Available Jobs</h2>

{% for job in jobs %}
<div class="job-card">
    <h3>{{ job.title }}</h3>
    <p><b>Company:</b> {{ job.company }}</p>
    <p>{{ job.description }}</p>
    <a href="/apply/{{ job.id }}"><button>Apply</button></a>
</div>
{% endfor %}

</body>
</html>
